name: Secure Cross-Platform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check for signing certificate
        id: check-cert
        shell: pwsh
        run: |
          $hasCert = -not [string]::IsNullOrWhiteSpace('${{ secrets.WINDOWS_CERT_PFX_BASE64 }}')
          "has-cert=$hasCert" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Materialize Windows signing certificate
        if: steps.check-cert.outputs.has-cert == 'True'
        id: win-cert
        shell: pwsh
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP 'codesign-windows.pfx'
          [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String('${{ secrets.WINDOWS_CERT_PFX_BASE64 }}'))
          "CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows artifacts
        if: steps.check-cert.outputs.has-cert != 'True'
        run: npx electron-builder --win nsis portable zip --publish never -c.forceCodeSigning=false

      - name: Build signed Windows artifacts
        if: steps.check-cert.outputs.has-cert == 'True'
        run: npx electron-builder --win nsis portable zip --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            release/*.exe
            release/*.blockmap
            release/*.zip
            release/latest.yml
          if-no-files-found: warn

  build-macos:
    runs-on: macos-latest
    env:
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Check for signing certificate
        id: check-cert
        run: |
          if [ -n "${{ secrets.MAC_CERT_P12_BASE64 }}" ]; then
            echo "has-cert=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-cert=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Materialize macOS signing certificate
        if: steps.check-cert.outputs.has-cert == 'true'
        run: |
          CERT_PATH="$RUNNER_TEMP/codesign-macos.p12"
          echo "${{ secrets.MAC_CERT_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"
          echo "CSC_LINK=$CERT_PATH" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned macOS artifacts
        if: steps.check-cert.outputs.has-cert != 'true'
        run: npx electron-builder --mac dmg zip --publish never -c.forceCodeSigning=false -c.mac.identity=null -c.mac.notarize=false

      - name: Build signed + notarized macOS artifacts
        if: steps.check-cert.outputs.has-cert == 'true'
        run: npx electron-builder --mac dmg zip --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
          if-no-files-found: warn

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos
    if: always()
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: artifacts/windows
        continue-on-error: true

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: artifacts/macos
        continue-on-error: true

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: false
          files: |
            artifacts/windows/*
            artifacts/macos/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
