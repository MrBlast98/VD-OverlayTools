<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      html, body {
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
        font-family: Segoe UI, Arial, sans-serif;
      }

      #frame {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #dragBar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 24px;
        display: none;
        align-items: center;
        padding: 0 8px;
        font: 12px/1.2 Segoe UI, Arial, sans-serif;
        color: #e6e6e6;
        background: rgba(0, 0, 0, 0.35);
        cursor: move;
        user-select: none;
        z-index: 3;
      }

      .resize-handle {
        position: absolute;
        display: none;
        z-index: 4;
        user-select: none;
      }

      #resizeSE {
        width: 22px;
        height: 22px;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, transparent 50%, rgba(255, 255, 255, 0.82) 50%);
        cursor: nwse-resize;
      }

      #resizeE,
      #resizeW {
        top: 28px;
        bottom: 10px;
        width: 12px;
      }

      #resizeE {
        right: 0;
        cursor: ew-resize;
      }

      #resizeW {
        left: 0;
        cursor: ew-resize;
      }

      #resizeS,
      #resizeN {
        left: 10px;
        right: 10px;
        height: 12px;
      }

      #resizeS {
        bottom: 0;
        cursor: ns-resize;
      }

      #resizeN {
        top: 24px;
        cursor: ns-resize;
      }

      #resizeNE,
      #resizeNW,
      #resizeSW {
        width: 16px;
        height: 16px;
      }

      #resizeNE {
        right: 0;
        top: 24px;
        cursor: nesw-resize;
      }

      #resizeNW {
        left: 0;
        top: 24px;
        cursor: nwse-resize;
      }

      #resizeSW {
        left: 0;
        bottom: 0;
        cursor: nesw-resize;
      }

      #mapView,
      #oneView,
      #fourView {
        width: 100%;
        height: 100%;
      }

      #mapView {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }

      #mapImg {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 100%;
        user-select: none;
        pointer-events: auto;
      }

      #oneView {
        display: none;
        color: #fff;
      }

      #fourView {
        display: none;
        color: #fff;
      }

      .four-card {
        width: 100%;
        height: 100%;
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: clamp(6px, 1.6vmin, 12px);
        background: rgba(5, 8, 18, 0.18);
        border: 1px solid rgba(117, 141, 201, 0.35);
        border-radius: clamp(10px, 2.2vmin, 16px);
        backdrop-filter: blur(2px);
        padding: clamp(8px, 2.8vmin, 22px);
        animation: overlayFloat 4.8s ease-in-out infinite;
      }

      .four-series {
        margin: 0;
        text-align: center;
        font-size: clamp(14px, 7.2vmin, 52px);
        line-height: 1.05;
        font-weight: 900;
        color: #f4dd73;
      }

      .four-match {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        column-gap: clamp(6px, 1.8vmin, 16px);
      }

      .four-team {
        font-size: clamp(14px, 7.8vmin, 58px);
        line-height: 1.05;
        font-weight: 800;
        text-align: center;
        overflow-wrap: anywhere;
      }

      .four-score {
        font-size: clamp(16px, 8.8vmin, 64px);
        line-height: 1;
        font-weight: 900;
        text-align: center;
        min-width: clamp(58px, 17vmin, 220px);
        white-space: nowrap;
        transition: transform 180ms ease, text-shadow 180ms ease;
      }

      .four-killer {
        margin: 0;
        text-align: center;
        font-size: clamp(12px, 5.8vmin, 42px);
        line-height: 1.08;
        font-weight: 700;
        color: #84efc9;
        overflow-wrap: anywhere;
      }

      .one-card {
        height: 100%;
        background: rgba(0, 0, 0, 0.65);
        border: 1px solid rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .one-header {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        min-height: 88px;
        width: 100%;
        background: rgba(14, 26, 56, 0.95);
      }

      .name {
        text-align: center;
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.02em;
        transition: transform 180ms ease;
      }

      .time-inline {
        margin-left: 6px;
        font-weight: 800;
      }

      .score {
        font-size: 44px;
        font-weight: 800;
        min-width: 160px;
        text-align: center;
        transition: transform 180ms ease, text-shadow 180ms ease;
      }

      #nameRowUnderline {
        position: absolute;
        left: 8%;
        right: 8%;
        height: 6px;
        bottom: calc(50% - 40px);
        border-radius: 999px;
        background: #2f7dff;
        box-shadow: 0 0 12px rgba(77, 142, 255, 0.45);
        animation: underlineGlow 2.8s ease-in-out infinite;
      }

      .mode-enter {
        animation: modeEnter 260ms ease-out;
      }

      .pulse-hit {
        animation: scoreHit 280ms ease-out;
      }

      .onevone-no-anim .one-card,
      .onevone-no-anim #nameRowUnderline {
        animation: none !important;
      }

      .onevone-no-anim .name,
      .onevone-no-anim .score {
        transition: none !important;
      }

      @keyframes modeEnter {
        0% {
          opacity: 0;
          transform: translateY(10px) scale(0.985);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes scoreHit {
        0% {
          transform: scale(1);
          text-shadow: 0 0 0 rgba(122, 195, 255, 0);
        }
        50% {
          transform: scale(1.12);
          text-shadow: 0 0 18px rgba(122, 195, 255, 0.72);
        }
        100% {
          transform: scale(1);
          text-shadow: 0 0 0 rgba(122, 195, 255, 0);
        }
      }

      @keyframes overlayFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }

      @keyframes underlineGlow {
        0%,
        100% {
          box-shadow: 0 0 10px rgba(77, 142, 255, 0.36);
        }
        50% {
          box-shadow: 0 0 18px rgba(106, 167, 255, 0.64);
        }
      }
    </style>
  </head>
  <body>
    <div id="frame">
      <div id="dragBar">Drag overlay (Always on top OFF)</div>

      <section id="mapView">
        <img id="mapImg" src="" alt="overlay image" />
      </section>

      <section id="oneView">
        <div class="one-card">
          <div class="one-header">
            <div class="name"><span id="p1NameText">Player 1</span><span id="p1TimeText" class="time-inline">(0:00)</span></div>
            <div id="score" class="score">0 - 0</div>
            <div class="name"><span id="p2NameText">Player 2</span><span id="p2TimeText" class="time-inline">(0:00)</span></div>
          </div>
          <div id="nameRowUnderline"></div>
        </div>
      </section>

      <section id="fourView">
        <div class="four-card">
          <p id="fourSeries" class="four-series">BEST OF 3</p>
          <div class="four-match">
            <div id="fourTeamOne" class="four-team">TEAM 1</div>
            <div id="fourScore" class="four-score">0-0</div>
            <div id="fourTeamTwo" class="four-team">TEAM 2</div>
          </div>
          <p id="fourKiller" class="four-killer">Killer: Abyss</p>
        </div>
      </section>

      <div id="resizeN" class="resize-handle" aria-label="Resize overlay north"></div>
      <div id="resizeS" class="resize-handle" aria-label="Resize overlay south"></div>
      <div id="resizeE" class="resize-handle" aria-label="Resize overlay east"></div>
      <div id="resizeW" class="resize-handle" aria-label="Resize overlay west"></div>
      <div id="resizeNE" class="resize-handle" aria-label="Resize overlay northeast"></div>
      <div id="resizeNW" class="resize-handle" aria-label="Resize overlay northwest"></div>
      <div id="resizeSE" class="resize-handle" aria-label="Resize overlay southeast"></div>
      <div id="resizeSW" class="resize-handle" aria-label="Resize overlay southwest"></div>
    </div>

    <script>
      const mapView = document.getElementById('mapView');
      const mapImg = document.getElementById('mapImg');
      const oneView = document.getElementById('oneView');
      const fourView = document.getElementById('fourView');
      const p1NameText = document.getElementById('p1NameText');
      const p2NameText = document.getElementById('p2NameText');
      const p1TimeText = document.getElementById('p1TimeText');
      const p2TimeText = document.getElementById('p2TimeText');
      const score = document.getElementById('score');
      const nameRowUnderline = document.getElementById('nameRowUnderline');
      const fourSeries = document.getElementById('fourSeries');
      const fourTeamOne = document.getElementById('fourTeamOne');
      const fourTeamTwo = document.getElementById('fourTeamTwo');
      const fourScore = document.getElementById('fourScore');
      const fourKiller = document.getElementById('fourKiller');

      const dragBar = document.getElementById('dragBar');
      const resizeHandles = [
        document.getElementById('resizeN'),
        document.getElementById('resizeS'),
        document.getElementById('resizeE'),
        document.getElementById('resizeW'),
        document.getElementById('resizeNE'),
        document.getElementById('resizeNW'),
        document.getElementById('resizeSE'),
        document.getElementById('resizeSW')
      ].filter(Boolean);

      let alwaysOnTop = true;
      let lastOneScore = '0 - 0';
      let lastFourScore = '0-0';
      let currentMode = 'map';
      let lastAutoFitSrc = '';
      let autoFitEnabled = true;
      let oneVOneAnimationsEnabled = true;

      function pulseElement(el, shouldAnimate = true) {
        if (!el) return;
        if (!shouldAnimate) return;
        el.classList.remove('pulse-hit');
        void el.offsetWidth;
        el.classList.add('pulse-hit');
      }

      function animateModeEnter(target, shouldAnimate = true) {
        if (!target) return;
        if (!shouldAnimate) return;
        target.classList.remove('mode-enter');
        void target.offsetWidth;
        target.classList.add('mode-enter');
      }

      function setOneVOneAnimationsEnabled(enabled) {
        oneVOneAnimationsEnabled = !!enabled;
        oneView.classList.toggle('onevone-no-anim', !oneVOneAnimationsEnabled);
      }

      function setEditControlsVisible(visible) {
        dragBar.style.display = visible ? 'flex' : 'none';
        resizeHandles.forEach((handle) => {
          handle.style.display = visible ? 'block' : 'none';
        });
      }

      function setMode(mode) {
        const oneMode = mode === '1v1';
        const fourMode = mode === '4v1';
        currentMode = oneMode ? '1v1' : (fourMode ? '4v1' : 'map');
        oneView.style.display = oneMode ? 'block' : 'none';
        fourView.style.display = fourMode ? 'block' : 'none';
        mapView.style.display = !oneMode && !fourMode ? 'flex' : 'none';

        if (oneMode) animateModeEnter(oneView, oneVOneAnimationsEnabled);
        if (fourMode) animateModeEnter(fourView);
        if (!oneMode && !fourMode) animateModeEnter(mapView);
      }

      function fitSizeToScreen(width, height) {
        const minWidth = 120;
        const minHeight = 80;
        const maxWidth = Math.max(minWidth, Math.floor(window.screen.availWidth * 0.9));
        const maxHeight = Math.max(minHeight, Math.floor(window.screen.availHeight * 0.9));

        let w = Math.max(minWidth, Math.round(width));
        let h = Math.max(minHeight, Math.round(height));
        const ratio = h > 0 ? w / h : 1;

        if (w > maxWidth) {
          w = maxWidth;
          h = Math.round(w / ratio);
        }
        if (h > maxHeight) {
          h = maxHeight;
          w = Math.round(h * ratio);
        }

        return {
          width: Math.max(minWidth, w),
          height: Math.max(minHeight, h)
        };
      }

      async function setOverlaySize(width, height, anchor = 'se') {
        const bounds = await window.overlayApi.getBounds();
        if (!bounds) return;

        const safe = fitSizeToScreen(width, height);
        const dx = safe.width - bounds.width;
        const dy = safe.height - bounds.height;

        let x = bounds.x;
        let y = bounds.y;

        if (anchor.includes('w')) x = bounds.x - dx;
        if (anchor.includes('n')) y = bounds.y - dy;

        window.overlayApi.setBounds({
          x,
          y,
          width: safe.width,
          height: safe.height
        });
      }

      async function fitMapToTrueSize() {
        if (currentMode !== 'map') return;
        const naturalWidth = mapImg.naturalWidth || 0;
        const naturalHeight = mapImg.naturalHeight || 0;
        if (!naturalWidth || !naturalHeight) return;
        await setOverlaySize(naturalWidth, naturalHeight, 'se');
      }

      mapImg.addEventListener('load', async () => {
        if (currentMode !== 'map') return;
        if (!mapImg.src || mapImg.src === lastAutoFitSrc) return;
        if (!autoFitEnabled) return;
        lastAutoFitSrc = mapImg.src;
        await fitMapToTrueSize();
      });

      function applyOneVOne(data) {
        if (!data) return;
        const p1Time = data.player1TimeText || '0:00';
        const p2Time = data.player2TimeText || '0:00';
        p1NameText.textContent = data.player1Name || 'Player 1';
        p2NameText.textContent = data.player2Name || 'Player 2';
        p1TimeText.textContent = `(${p1Time})`;
        p2TimeText.textContent = `(${p2Time})`;
        p1NameText.style.color = data.player1NameColor || '#ffffff';
        p2NameText.style.color = data.player2NameColor || '#ffffff';
        p1TimeText.style.color = data.timerColor || '#ffffff';
        p2TimeText.style.color = data.timerColor || '#ffffff';

        const s1 = Number.isFinite(data.player1Score) ? data.player1Score : 0;
        const s2 = Number.isFinite(data.player2Score) ? data.player2Score : 0;
        const nextScore = `${s1} - ${s2}`;
        score.textContent = nextScore;
        score.style.color = data.scoreColor || '#4fc3ff';
        nameRowUnderline.style.background = data.underlineColor || '#2f7dff';

        if (nextScore !== lastOneScore) {
          pulseElement(score, oneVOneAnimationsEnabled);
        }
        lastOneScore = nextScore;
      }

      function applyTournament(data) {
        if (!data) return;
        const team1 = data.teamOne || 'Team 1';
        const team2 = data.teamTwo || 'Team 2';
        const s1 = Number.isFinite(data.teamOneScore) ? data.teamOneScore : 0;
        const s2 = Number.isFinite(data.teamTwoScore) ? data.teamTwoScore : 0;
        const bestOf = data.bestOf || '3';
        const killer = data.killer || 'Abyss';

        fourSeries.textContent = `BEST OF ${bestOf}`;
        fourTeamOne.textContent = team1.toUpperCase();
        fourTeamTwo.textContent = team2.toUpperCase();
        const nextScore = `${s1}-${s2}`;
        fourScore.textContent = nextScore;
        fourKiller.textContent = `Killer: ${killer}`;

        if (nextScore !== lastFourScore) {
          pulseElement(fourScore);
        }
        lastFourScore = nextScore;
      }

      window.overlayApi.onUpdate((opts) => {
        if (!opts) return;

        if (opts.autoFit !== undefined) {
          autoFitEnabled = !!opts.autoFit;
        }

        if (opts.mode) setMode(opts.mode);

        if (opts.fontFamily) {
          document.body.style.fontFamily = `"${opts.fontFamily}", "Segoe UI", Arial, sans-serif`;
        }

        if (opts.image) {
          mapImg.src = opts.image;
        }

        if (opts.opacity !== undefined) {
          document.body.style.opacity = opts.opacity;
        }

        if (opts.alwaysOnTop !== undefined) {
          alwaysOnTop = !!opts.alwaysOnTop;
          setEditControlsVisible(!alwaysOnTop);
        }

        if (opts.onevone) {
          if (opts.onevone.animationsEnabled !== undefined) {
            setOneVOneAnimationsEnabled(!!opts.onevone.animationsEnabled);
          }
          applyOneVOne(opts.onevone);
        }

        if (opts.tournament) {
          applyTournament(opts.tournament);
        }
      });

      dragBar.addEventListener('mousedown', async (event) => {
        if (alwaysOnTop) return;
        event.preventDefault();
        event.stopPropagation();

        const startBounds = await window.overlayApi.getBounds();
        if (!startBounds) return;

        const startX = event.screenX;
        const startY = event.screenY;

        function onMove(moveEvent) {
          const dx = moveEvent.screenX - startX;
          const dy = moveEvent.screenY - startY;
          window.overlayApi.setBounds({
            x: startBounds.x + dx,
            y: startBounds.y + dy
          });
        }

        function onUp() {
          window.removeEventListener('mousemove', onMove);
          window.removeEventListener('mouseup', onUp);
        }

        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onUp);
      });

      function bindResize(handleId, horizontalDir, verticalDir) {
        const handle = document.getElementById(handleId);
        if (!handle) return;

        handle.addEventListener('mousedown', async (event) => {
          if (alwaysOnTop) return;
          event.preventDefault();
          event.stopPropagation();

          const startBounds = await window.overlayApi.getBounds();
          if (!startBounds) return;

          const startX = event.screenX;
          const startY = event.screenY;
          const ratio = startBounds.height > 0 ? (startBounds.width / startBounds.height) : 1;

          function onMove(moveEvent) {
            const dx = moveEvent.screenX - startX;
            const dy = moveEvent.screenY - startY;

            let width = startBounds.width;
            let height = startBounds.height;
            let x = startBounds.x;
            let y = startBounds.y;

            if (horizontalDir === 'e') width = startBounds.width + dx;
            if (horizontalDir === 'w') {
              width = startBounds.width - dx;
              x = startBounds.x + dx;
            }
            if (verticalDir === 's') height = startBounds.height + dy;
            if (verticalDir === 'n') {
              height = startBounds.height - dy;
              y = startBounds.y + dy;
            }

            const preserveRatio = (currentMode === 'map' || moveEvent.shiftKey) && ratio > 0;
            if (preserveRatio) {
              if (Math.abs(dx) > Math.abs(dy)) {
                height = Math.round(width / ratio);
              } else {
                width = Math.round(height * ratio);
              }
              if (horizontalDir === 'w') {
                x = startBounds.x + (startBounds.width - width);
              }
              if (verticalDir === 'n') {
                y = startBounds.y + (startBounds.height - height);
              }
            }

            window.overlayApi.setBounds({ x, y, width, height });
          }

          function onUp() {
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
          }

          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
        });
      }

      bindResize('resizeSE', 'e', 's');
      bindResize('resizeNE', 'e', 'n');
      bindResize('resizeSW', 'w', 's');
      bindResize('resizeNW', 'w', 'n');
      bindResize('resizeE', 'e', '');
      bindResize('resizeW', 'w', '');
      bindResize('resizeS', '', 's');
      bindResize('resizeN', '', 'n');

      window.addEventListener('keydown', async (event) => {
        if (alwaysOnTop) return;

        if (event.key === '+' || event.key === '=') {
          event.preventDefault();
          const bounds = await window.overlayApi.getBounds();
          if (!bounds) return;
          await setOverlaySize(bounds.width * 1.08, bounds.height * 1.08, 'se');
        }

        if (event.key === '-') {
          event.preventDefault();
          const bounds = await window.overlayApi.getBounds();
          if (!bounds) return;
          await setOverlaySize(bounds.width * 0.92, bounds.height * 0.92, 'se');
        }

        if (event.key === '0') {
          event.preventDefault();
          await fitMapToTrueSize();
        }
      });
    </script>
  </body>
</html>
